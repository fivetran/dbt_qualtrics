#   databricks: ">=1.6.0,<2.0.0"

schema_variable_name: "qualtrics_schema"

include_databricks_sql: false
include_sqlserver: false
include_dbt_compile: false

test_scenarios:
  - name: "Default"
    vars: {}
    include_incremental: false

  - name: "core features enabled"
    vars:
      qualtrics__using_core_contacts: true
      qualtrics__using_core_mailing_lists: true
    include_incremental: false

  - name: "directory contacts disabled"
    vars:
      qualtrics__using_core_contacts: true
      qualtrics__using_directory_contacts: false
      qualtrics__using_core_mailing_lists: true
    include_incremental: false

  - name: "contact mailing list memberships disabled"
    vars:
      qualtrics__using_core_contacts: true
      qualtrics__using_directory_contacts: true
      qualtrics__using_core_mailing_lists: true
      qualtrics__using_contact_mailing_list_memberships: false
    include_incremental: false

  - name: "MDLS"
    vars:
      fivetran_using_source_casing: true
    include_incremental: false
    include_dbt_seed: true
