database_key: qualtrics_database
schema_key: qualtrics_schema

dbt_versions: ">=1.3.0 <3.0.0"

table_variables:
  qualtrics__using_core_contacts:
    - core_contact
  qualtrics__using_core_mailing_lists:
    - core_mailing_list

  _fivetran_quickstart_survey_embedded_data:
    - survey_embedded_data

destination_configurations:
  databricks:
    dispatch:
      - macro_namespace: dbt_utils
        search_order: [ 'spark_utils', 'dbt_utils' ]

public_models: [
  "qualtrics__directory",
  "qualtrics__distribution",
  "qualtrics__response",
  "qualtrics__daily_breakdown",
  "qualtrics__survey",
  "qualtrics__contact"
]

supported_vars:
  qualtrics__survey_pass_through_columns:
    type: dictionary
    description: "Additional `SURVEY` columns to include in `qualtrics__survey`"
    display_name: "Additional Survey Columns"

  qualtrics__distribution_pass_through_columns:
    type: dictionary
    description: "Additional `DISTRIBUTION` columns to include in `qualtrics__distribution`"
    display_name: "Additional Distribution Columns"

  qualtrics__directory_pass_through_columns:
    type: dictionary
    description: "Additional `DIRECTORY` columns to include in `qualtrics__directory`"
    display_name: "Additional Directory Columns"

  qualtrics__directory_contact_pass_through_columns:
    type: dictionary
    description: "Additional `DIRECTORY_CONTACT` columns to include in `qualtrics__contact`"
    display_name: "Additional Directory Contact Columns"

  qualtrics__core_contact_pass_through_columns:
    type: dictionary
    description: "Additional `CORE_CONTACT` columns to include in `qualtrics__contact`"
    display_name: "Additional Core Contact Columns"

